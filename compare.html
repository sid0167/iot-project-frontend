<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="compare.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<!-- GSAP core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- Draggable plugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>

<!-- Inertia plugin (for smooth momentum dragging) -->
<script src="https://assets.codepen.io/16327/InertiaPlugin.min.js"></script>

<script src="compare.js"></script>

  
  <title>Ball Demo</title>
</head>
<body>
  <div class="radio-input" id="theme">
    <label class="label">
      <input type="radio" checked name="value-radio" value="1" />
      <p class="text">Stress Ball</p>
    </label>
    <label class="label">
      <input type="radio" name="value-radio" value="2" />
      <p class="text">Tennis Ball</p>
    </label>
  </div>

  <div class="presentation">
    <h1>STRESS BALL</h1>
    <p>Feel all your stress fade away</p>
  </div>

  <div class="ball"></div>

  <div class="hint backdrop">Drag and release the ball to make it spin and bounce</div>
  
  
</body>
</html>
