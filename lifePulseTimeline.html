<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Life Pulse Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css?family=Ubuntu&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="back-button.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="data.js"></script>

  <style>
    body {
      font-family: 'Ubuntu', sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #2d3436;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timeline {
      max-width: 800px;
      margin: 2rem auto;
      position: relative;
      padding-left: 2rem;
      border-left: 3px solid #6c5ce7;
    }

    .entry {
      margin-bottom: 2rem;
      position: relative;
      opacity: 0;
      transform: translateY(30px);
      animation: slideUp 0.8s forwards;
    }

    .entry:nth-child(even) {
      animation-delay: 0.2s;
    }

    .entry::before {
      content: '';
      position: absolute;
      left: -11px;
      top: 0;
      width: 16px;
      height: 16px;
      background: #6c5ce7;
      border-radius: 50%;
    }

    .entry-content {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .summary {
      max-width: 800px;
      margin: 2rem auto;
      background: #ffeaa7;
      padding: 1rem;
      border-radius: 8px;
      font-weight: bold;
    }

    .buttons {
      text-align: center;
      margin: 1rem auto;
    }

    .buttons button {
      padding: 10px 20px;
      margin: 0.5rem;
      background: #6c5ce7;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>Life Pulse Timeline</h2>
    <a class="back-button" href="dashboard.html">Back</a>
  </div>

  <div class="buttons">
    <select id="monthFilter" onchange="filterByMonth()">
      <option value="all">All Months</option>
    </select>
    <button onclick="exportToCSV()">Export CSV</button>
    <button onclick="exportToPDF()">Export PDF</button>
  </div>

  <div id="timeline" class="timeline"></div>
  <div class="summary" id="summaryBox"></div>

  <script>
    let fullData = [];

    function fetchTimelineData() {
      // Use frontend mock data provided by data.js when available
      if (typeof window !== 'undefined' && Array.isArray(window.healthRecords)) {
        fullData = window.healthRecords.slice();
        // normalize: ensure `date` field exists (mock uses `date`)
        fullData.forEach(r => { if (!r.date && r.timestamp) r.date = r.timestamp; });
        // sort newest first
        fullData.sort((a, b) => new Date(b.date) - new Date(a.date));
        populateMonthFilter(fullData);
        renderTimeline(fullData);
        generateSummary(fullData);
      } else {
        fullData = [];
        document.getElementById('timeline').innerHTML = '<p style="text-align:center; padding:1rem">No records available</p>';
        document.getElementById('summaryBox').innerText = 'No data available';
      }
    }

    function populateMonthFilter(data) {
      const select = document.getElementById('monthFilter');
      select.innerHTML = '';
      const allOpt = document.createElement('option');
      allOpt.value = 'all';
      allOpt.textContent = 'All Months';
      select.appendChild(allOpt);
      const months = new Set(data.map(d => new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' })));
      months.forEach(month => {
        const opt = document.createElement('option');
        opt.value = month;
        opt.textContent = month;
        select.appendChild(opt);
      });
    }

    function renderTimeline(data) {
      const container = document.getElementById('timeline');
      container.innerHTML = '';
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:1rem">No records found</p>';
        return;
      }
      data.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'entry';
        const dateStr = new Date(entry.date).toLocaleString();
        div.innerHTML = `
          <div class="entry-content">
            <strong>${dateStr}</strong>
            <div style="margin-top:8px">
              <div>Temperature: <strong>${entry.temperature} °C</strong></div>
              <div>Heart Rate: <strong>${entry.heartRate} bpm</strong></div>
              <div>SpO₂: <strong>${entry.spo2}%</strong></div>
              <div>BMI: <strong>${entry.bmi}</strong></div>
            </div>
          </div>`;
        container.appendChild(div);
      });
    }

    function getDisplayedData() {
      const selected = document.getElementById('monthFilter').value;
      if (selected === 'all' || !selected) return fullData;
      return fullData.filter(d => new Date(d.date).toLocaleString('default', { month: 'long', year: 'numeric' }) === selected);
    }

    function filterByMonth() {
      const filtered = getDisplayedData();
      renderTimeline(filtered);
      generateSummary(filtered);
    }

    function exportToCSV() {
      const data = getDisplayedData();
      const csv = Papa.unparse(data.map(d => ({
        date: d.date,
        temperature: d.temperature,
        heartRate: d.heartRate,
        spo2: d.spo2,
        bmi: d.bmi
      })));
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'health_data.csv';
      link.click();
    }

    function exportToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(12);
      const data = getDisplayedData();
      data.forEach((d, i) => {
        const y = 10 + i * 10;
        doc.text(`Date: ${new Date(d.date).toLocaleString()}`, 10, y);
        doc.text(`Temp: ${d.temperature}°C | HR: ${d.heartRate} bpm | SpO₂: ${d.spo2}% | BMI: ${d.bmi}`, 10, y + 5);
        if ((i + 1) % 25 === 0) doc.addPage();
      });
      doc.save('health_data.pdf');
    }

    function generateSummary(data) {
      if (!data || data.length === 0) return document.getElementById('summaryBox').innerText = "No data available";

      const avg = arr => (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2);
      const tempAvg = avg(data.map(d => d.temperature));
      const hrAvg = avg(data.map(d => d.heartRate));
      const spo2Avg = avg(data.map(d => d.spo2));
      const bmiAvg = avg(data.map(d => d.bmi));
      let status = 'Normal';
      if (tempAvg > 37.5 || hrAvg > 90 || spo2Avg < 95) status = 'High/Concern';
      else if (tempAvg < 36 || hrAvg < 60) status = 'Low/Monitor';

      document.getElementById('summaryBox').innerText =
        `Summary: Avg Temp: ${tempAvg} °C, HR: ${hrAvg} bpm, SpO₂: ${spo2Avg}% , BMI: ${bmiAvg} → Status: ${status}`;
    }

    // initialize
    fetchTimelineData();
  </script>
</body>
</html>
