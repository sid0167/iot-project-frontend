<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My IoT Data</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <div class="container" style="padding-top: 2rem;">
    <a class="btn" href="dashboard.html">← Back to Dashboard</a>
    <div class="card mt-2">
      <div class="section-header">
        <div>
          <h2>My IoT Device Data</h2>
          <p class="muted">This page stores readings generated by your own device session and keeps them separate from the general historical records.</p>
        </div>
        <button class="btn danger" onclick="clearAllPersonalData()">Clear My Data</button>
      </div>

      <div class="card mt-2">
        <h3>Add a new reading</h3>
        <form class="form-grid" onsubmit="saveReadingFromForm(event)">
          <label>
            Temperature (°C)
            <input id="tempInput" type="number" step="0.1" required />
          </label>
          <label>
            Heart Rate (bpm)
            <input id="heartInput" type="number" required />
          </label>
          <label>
            SpO₂ (%)
            <input id="spo2Input" type="number" required />
          </label>
          <label>
            Note
            <textarea id="noteInput" rows="3" placeholder="Optional note about the reading"></textarea>
          </label>
          <button class="btn" type="submit">Save Reading</button>
        </form>
      </div>

      <div class="card mt-2">
        <h3>Your saved readings</h3>
        <div id="userReadingsList" class="reading-list"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function renderUserReadings() {
      const records = getPersonalRecords();
      const container = document.getElementById('userReadingsList');

      if (!records.length) {
        container.innerHTML = '<div class="empty-state">No personal readings yet. Add your first reading from the form above.</div>';
        return;
      }

      container.innerHTML = records.map((record) => `
        <div class="reading-item">
          <div>
            <strong>${new Date(record.date).toLocaleString()}</strong>
            <div class="muted">Temp: ${record.temperature} °C · Heart: ${record.heartRate} bpm · SpO₂: ${record.spo2} %</div>
            ${record.note ? `<div class="muted">Note: ${record.note}</div>` : ''}
          </div>
          <span class="btn secondary">Saved</span>
        </div>
      `).join('');
    }

    function saveReadingFromForm(event) {
      event.preventDefault();
      const payload = {
        temperature: document.getElementById('tempInput').value,
        heartRate: document.getElementById('heartInput').value,
        spo2: document.getElementById('spo2Input').value,
        note: document.getElementById('noteInput').value,
        date: new Date().toISOString()
      };

      savePersonalRecord(payload);
      event.target.reset();
      renderUserReadings();
      alert('Reading saved for this user.');
    }

    function clearAllPersonalData() {
      if (confirm('Remove all saved readings for this user?')) {
        clearPersonalRecords();
        renderUserReadings();
      }
    }

    renderUserReadings();
  </script>
</body>
</html>
